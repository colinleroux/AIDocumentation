site_name: Colin's AI Engineering Notes
site_url: https://colinleroux.github.io/AIDocumentation/

theme:
  name: material
  font:
    text: Merriweather Sans
    code: Red Hat Mono
  icon:
    logo: fontawesome/solid/hotdog
  favicon: assets/favicon.ico
  features:
    - navigation.footer
    - content.code.copy
  palette:
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: teal
      accent: blue
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: deep orange
      accent: blue

nav:
  - Home: index.md
  - AI Engineering Fundamentals: ai-fundamentals.md
  - RAG Systems:
      - Overview: rag/index.md
      - Chunking: rag/chunking.md
      - Retrieval: rag/retrieval.md
      - Evaluation: rag/evaluation.md
  - Local Models:
      - Overview: local-models/index.md
      - Ollama: local-models/ollama.md
      - Performance: local-models/performance.md
  - Projects:
      - Overview: projects/index.md
      - Internal RAG System: projects/internal-rag-system.md
  - Patterns & Recipes:
      - Overview: patterns/index.md
      - RAG Pipeline: patterns/rag-pipeline.md
      - Flask AI App Structure: patterns/flask-ai-app-structure.md
      - Prompt Templates: patterns/prompt-templates.md
      - Tool Calling Patterns: patterns/tool-calling-patterns.md
  - Tooling & Stack: tooling.md
  - Experiments & Findings:
      - Overview: experiments/index.md
      - RAG vs No RAG: experiments/rag-vs-no-rag.md
      - Model Comparison: experiments/model-comparison.md
      - Chunk Size Testing: experiments/chunk-size-testing.md
  - Mistakes & Lessons Learned: lessons.md
  - Future Ideas / Roadmap: roadmap.md
  - Architecture Diagrams: architecture.md
  - Glossary: glossary.md

markdown_extensions:
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - md_in_html

copyright: Copyright &copy; 2026 Colin le Roux
